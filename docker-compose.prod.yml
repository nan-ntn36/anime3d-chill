# ============================================
# Anime3D-Chill — Docker Compose (Production)
# ============================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml down
#   docker compose -f docker-compose.prod.yml logs -f
# ============================================

services:
  # ── MySQL 8.0 ──────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: anime3d-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - app-network

  # ── Redis 7 ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: anime3d-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Backend (Express) ──────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: anime3d-server
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CLIENT_URL: ${CLIENT_URL}
      KKPHIM_API_URL: https://phimapi.com
      LOG_LEVEL: info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # ── Frontend (Vite + React → nginx) ────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    container_name: anime3d-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - app-network

  # ── Admin CMS (Vite + React → nginx) ───────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      target: production
    container_name: anime3d-admin
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - server
    networks:
      - app-network

# ── Volumes ────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ───────────────────────────────────
networks:
  app-network:
    driver: bridge
